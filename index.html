<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-in</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <form>
        <h2>Please Sign in</h2>
        <div>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
          />
        </div>
        <div>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Password"
            class="input2"
          />
        </div>
        <div class="check">
          <input type="checkbox" name="remember" class="checkboxx" />
          <p class="rm">Remember me</p>
        </div>
        <button>Sign in</button>
        <h4>Copyright © 2026 Davi Queiroz</h4>
      </form>
    </section>
  </body>
</html>
